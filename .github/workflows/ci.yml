name: Ritvik's CI WorkFlow

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest #Free Github Runners
    steps:
      - name: Checkout Code
      - uses: actions/checkout@v6 # Allows the checkout of the code tagging version and branch to pull from
      - name: Setup Docker
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
